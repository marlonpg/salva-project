databaseChangeLog:
  - changeSet:
      id: 001-create-transport-request-table
      author: copilot
      changes:
        - createTable:
            tableName: transport_request
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transport_request
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: requester
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: service_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: tax
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-transport-request-team-table
      author: copilot
      changes:
        - createTable:
            tableName: transport_request_team
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: RANDOM_UUID()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transport_request_team
                    nullable: false
              - column:
                  name: transport_request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: person_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: transport_request_team
            baseColumnNames: transport_request_id
            referencedTableName: transport_request
            referencedColumnNames: id
            constraintName: fk_transport_request_team_request
            onDelete: CASCADE

  - changeSet:
      id: 003-add-requester-identification-fields
      author: copilot
      changes:
        - addColumn:
            tableName: transport_request
            columns:
              - column:
                  name: requester_id_number
                  type: VARCHAR(64)
                  defaultValue: ""
                  constraints:
                    nullable: false
              - column:
                  name: requester_email
                  type: VARCHAR(255)
                  defaultValue: ""
                  constraints:
                    nullable: false
