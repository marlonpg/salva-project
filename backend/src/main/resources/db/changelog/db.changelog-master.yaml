databaseChangeLog:
  - changeSet:
      id: 001-create-transport-request-table
      author: copilot
      changes:
        - createTable:
            tableName: transport_request
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transport_request
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: requester
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: service_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: tax
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-transport-request-team-table
      author: copilot
      changes:
        - createTable:
            tableName: transport_request_team
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: RANDOM_UUID()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transport_request_team
                    nullable: false
              - column:
                  name: transport_request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: person_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: transport_request_team
            baseColumnNames: transport_request_id
            referencedTableName: transport_request
            referencedColumnNames: id
            constraintName: fk_transport_request_team_request
            onDelete: CASCADE

  - changeSet:
      id: 003-add-requester-identification-fields
      author: copilot
      changes:
        - addColumn:
            tableName: transport_request
            columns:
              - column:
                  name: requester_id_number
                  type: VARCHAR(64)
                  defaultValue: ""
                  constraints:
                    nullable: false
              - column:
                  name: requester_email
                  type: VARCHAR(255)
                  defaultValue: ""
                  constraints:
                    nullable: false

  - changeSet:
      id: 004-create-transport-request-imported-table
      author: copilot
      changes:
        - createTable:
            tableName: transport_request_imported
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transport_request_imported
                    nullable: false
              - column:
                  name: import_number
                  type: INTEGER
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_transport_request_imported_number
              - column:
                  name: transport_request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: extra_amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: true
              - column:
                  name: result_amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: true
              - column:
                  name: import_month
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
              - column:
                  name: service_invoice
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: vet_invoice
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: transport_request_imported
            baseColumnNames: transport_request_id
            referencedTableName: transport_request
            referencedColumnNames: id
            constraintName: fk_transport_request_imported_request
            onDelete: CASCADE

  - changeSet:
      id: 005-create-expense-table
      author: copilot
      changes:
        - createTable:
            tableName: expense
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_expense
                    nullable: false
              - column:
                  name: referencia
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: requerente
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: categoria
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: pago
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: valor
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: data_lancamento
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 006-create-login-request-table
      author: copilot
      changes:
        - createTable:
            tableName: login_request
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_login_request
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_login_request_email
              - column:
                  name: status
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: requested_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: approved_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: approved_by
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 007-create-access-code-table
      author: copilot
      changes:
        - createTable:
            tableName: access_code
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_access_code
                    nullable: false
              - column:
                  name: login_request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: access_code
            baseColumnNames: login_request_id
            referencedTableName: login_request
            referencedColumnNames: id
            constraintName: fk_access_code_login_request
            onDelete: CASCADE
  - changeSet:
      id: 008-create-session-token-table
      author: copilot
      changes:
        - createTable:
            tableName: session_token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_session_token
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: jwt_token
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_session_token_jwt
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 009-insert-admin-login-request
      author: copilot
      changes:
        - insert:
            tableName: login_request
            columns:
              - column:
                  name: email
                  value: gambadeveloper@gmail.com
              - column:
                  name: status
                  value: APPROVED
              - column:
                  name: requested_at
                  valueDate: now()
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
